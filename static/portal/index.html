<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <!-- Deep links: one sync document.write emits <base>, stylesheet, and all portal scripts with absolute URLs (avoids preload/wrong-path 404s). -->
  <script>
    (function () {
      function q(s) {
        return String(s).replace(/"/g, '%22');
      }
      function portalRoot() {
        try {
          var path = decodeURIComponent(location.pathname || '/');
          var m = path.match(/^(.*?\/portal)(?=\/|$)/i);
          if (m) return location.origin + m[1] + '/';
          var dir = path.replace(/\/[^/]*$/, '/');
          if (dir === '//' || dir === '/') return location.origin + '/';
          return location.origin + (dir.charAt(0) === '/' ? dir : '/' + dir);
        } catch (e) {
          return new URL('./', location.href).href;
        }
      }
      try {
        var root = portalRoot();
        window.__SLATE_PORTAL_ROOT__ = root;
        document.write('<base href="' + q(root) + '" />');
        document.write('<link rel="stylesheet" href="' + q(root) + 'styles.css" />');
        var assets = [
          'vendor/react.development.js',
          'vendor/react-dom.development.js',
          'vendor/babel.min.js',
          'lib.js',
          'data.js',
          'copy.js',
          'analytics.js',
          'client-store.js',
        ];
        for (var i = 0; i < assets.length; i++) {
          document.write('<script src="' + q(root + assets[i]) + '"><\/script>');
        }
        document.write('<script>window.__SLATE_WM_HANDOFF_TO_KIT__ = true;<\/script>');
        document.write('<script src="' + q(root + 'boot.js') + '"><\/script>');
      } catch (e) { /* ignore */ }
    })();
  </script>
  <title>Slate Private Wealth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="description" content="Slate Private Wealth — workspace experience"/>
  <link rel="icon" type="image/png" sizes="150x150" href="../brand/favicon.png?v=4" id="slate-favicon"/>
  <link rel="shortcut icon" type="image/png" href="../brand/favicon.png?v=4" id="slate-favicon-shortcut"/>
  <link rel="apple-touch-icon" href="../brand/apple-touch-icon.png?v=4"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body data-theme="light">
  <div id="root"></div>
</body>
</html>
