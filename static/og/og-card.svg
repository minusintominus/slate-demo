<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#fafaf7"/>

  <!-- Vertical accent bar at left -->
  <rect x="64" y="120" width="4" height="390" fill="#1f3d6e"/>

  <!-- Pull quote -->
  <text x="100" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="500" fill="#14161a" letter-spacing="-1.5">
    <tspan x="100" dy="0">One workstation for all client</tspan>
    <tspan x="100" dy="62">relationship — onboarding, briefing,</tspan>
    <tspan x="100" dy="62">multi-custodian portfolios,</tspan>
    <tspan x="100" dy="62">alternatives &amp; structured products.</tspan>
  </text>

  <!-- Wordmark, anchored bottom-left -->
  <g transform="translate(64, 540)">
    <g transform="scale(2.4)">
      <rect x="0" y="7" width="4" height="5" rx="0.8" fill="#14161a"/>
      <rect x="5.5" y="3.5" width="4" height="8.5" rx="0.8" fill="#14161a"/>
      <rect x="11" y="0" width="4" height="12" rx="0.8" fill="#14161a"/>
    </g>
    <text x="56" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="600" letter-spacing="-1" fill="#14161a">Slate</text>
    <text x="56" y="50" font-family="-apple-system, 'Inter Tight', sans-serif" font-size="15" fill="#6b6e75">Software demo for wealth managers</text>
  </g>

  <!-- Demo pill, bottom-right -->
  <g transform="translate(946, 540)">
    <rect width="184" height="32" rx="16" fill="#ffffff" stroke="#dcdcd6"/>
    <circle cx="20" cy="16" r="4" fill="#1f3d6e"/>
    <text x="36" y="21" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#3a3d44">DEMO ENVIRONMENT</text>
  </g>
</svg>
